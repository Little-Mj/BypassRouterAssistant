<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">旁路由助手界面预览</title>
  <desc id="desc">旁路由助手控制中心和菜单栏面板，展示当前 Wi-Fi 配置、网速和 DHCP 切换操作。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf7ff"/>
      <stop offset="1" stop-color="#f7f2ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2fbff"/>
      <stop offset="1" stop-color="#fbf8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1d2a44" flood-opacity="0.16"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; fill: #20242b; }
      .muted { fill: #757c87; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; }
      .small { font-size: 15px; }
      .label { font-size: 16px; fill: #747b86; }
      .value { font-size: 22px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="38" fill="url(#bg)"/>
  <circle cx="1325" cy="95" r="180" fill="#ff8a24" opacity="0.08"/>
  <circle cx="80" cy="820" r="200" fill="#138bf6" opacity="0.07"/>

  <!-- Main window -->
  <g filter="url(#shadow)">
    <rect x="40" y="54" width="940" height="790" rx="24" fill="#fff"/>
    <rect x="40" y="54" width="940" height="46" rx="24" fill="#f4f5f7"/>
    <rect x="40" y="78" width="940" height="22" fill="#f4f5f7"/>
    <circle cx="70" cy="77" r="7" fill="#ff5f57"/>
    <circle cx="94" cy="77" r="7" fill="#febc2e"/>
    <circle cx="118" cy="77" r="7" fill="#28c840"/>
    <text x="510" y="83" text-anchor="middle" class="ui small" font-weight="600">旁路由助手</text>
  </g>

  <!-- Sidebar -->
  <rect x="40" y="100" width="220" height="744" fill="#f7f8fa"/>
  <rect x="58" y="122" width="184" height="118" rx="16" fill="#fff" stroke="#e7e9ed"/>
  <circle cx="82" cy="150" r="9" fill="#ff8a24"/>
  <text x="100" y="156" class="ui" font-size="18" font-weight="650">Home Wi-Fi</text>
  <text x="76" y="188" class="ui muted small">旁路由</text>
  <text x="226" y="188" text-anchor="end" class="ui muted small mono">192.168.5.188</text>
  <text x="76" y="216" class="ui muted" font-size="13">↓ 12 KB/s</text>
  <text x="226" y="216" text-anchor="end" class="ui muted" font-size="13">↑ 3 KB/s</text>

  <rect x="58" y="264" width="184" height="42" rx="10" fill="#e7eefc"/>
  <text x="78" y="291" class="ui" font-size="16" font-weight="600">◉  概览</text>
  <text x="78" y="344" class="ui muted" font-size="16">⌁  Wi-Fi 配置</text>
  <text x="78" y="397" class="ui muted" font-size="16">▤  操作日志</text>
  <text x="78" y="808" class="ui muted small">⏻  退出应用</text>

  <!-- Dashboard header -->
  <text x="294" y="156" class="ui" font-size="32" font-weight="720">Home Wi-Fi</text>
  <text x="294" y="184" class="ui muted" font-size="17">Wi-Fi · en0</text>
  <rect x="820" y="132" width="118" height="42" rx="21" fill="#fff1e5"/>
  <text x="879" y="159" text-anchor="middle" class="ui" font-size="17" font-weight="650" fill="#ff7a00">⌁ 旁路由</text>

  <!-- Metrics -->
  <g>
    <rect x="294" y="218" width="202" height="118" rx="18" fill="#edf3ff"/>
    <text x="314" y="250" class="ui label">◎  IP 地址</text>
    <text x="314" y="294" class="ui value mono">192.168.5.188</text>

    <rect x="512" y="218" width="202" height="118" rx="18" fill="#edf3ff"/>
    <text x="532" y="250" class="ui label">⌁  网关</text>
    <text x="532" y="294" class="ui value mono">192.168.5.202</text>

    <rect x="730" y="218" width="208" height="118" rx="18" fill="#edf3ff"/>
    <text x="750" y="250" class="ui label">▤  DNS</text>
    <text x="750" y="294" class="ui value mono">192.168.5.202</text>

    <rect x="294" y="352" width="202" height="118" rx="18" fill="#eefaf1"/>
    <text x="314" y="384" class="ui label">↓  下载速度</text>
    <text x="314" y="428" class="ui value">12 KB/s</text>

    <rect x="512" y="352" width="202" height="118" rx="18" fill="#fbf0fd"/>
    <text x="532" y="384" class="ui label">↑  上传速度</text>
    <text x="532" y="428" class="ui value">3 KB/s</text>

    <rect x="730" y="352" width="208" height="118" rx="18" fill="#edf3ff"/>
    <text x="750" y="384" class="ui label">▥  子网掩码</text>
    <text x="750" y="428" class="ui value mono" font-size="19">255.255.255.0</text>
  </g>

  <!-- Recommended action -->
  <rect x="294" y="496" width="644" height="160" rx="20" fill="#f5f5f6"/>
  <rect x="316" y="526" width="62" height="62" rx="16" fill="#e6f1ff"/>
  <text x="347" y="566" text-anchor="middle" class="ui" font-size="28" fill="#0b84f3">↻</text>
  <text x="400" y="528" class="ui" font-size="14" font-weight="650" fill="#0b84f3">当前已启用旁路由</text>
  <text x="400" y="558" class="ui" font-size="20" font-weight="680">需要恢复自动网络配置吗？</text>
  <text x="400" y="584" class="ui muted" font-size="14">IP 与 DNS 将重新由当前网络自动分配</text>
  <rect x="760" y="535" width="154" height="46" rx="12" fill="#0b84f3"/>
  <text x="837" y="565" text-anchor="middle" font-family="-apple-system, PingFang SC" font-size="16" font-weight="650" fill="#fff">↻ 恢复 DHCP</text>
  <text x="837" y="612" text-anchor="middle" class="ui" font-size="13" fill="#0b84f3">编辑已保存配置</text>

  <rect x="294" y="678" width="644" height="84" rx="18" fill="#effaf2"/>
  <circle cx="329" cy="720" r="18" fill="#28a745"/>
  <text x="329" y="727" text-anchor="middle" font-family="-apple-system" font-size="18" fill="#fff">✓</text>
  <text x="360" y="714" class="ui" font-size="17" font-weight="650">切换成功</text>
  <text x="360" y="737" class="ui muted" font-size="14">已应用旁路由配置</text>

  <!-- Menu panel -->
  <g filter="url(#shadow)">
    <rect x="1010" y="118" width="390" height="650" rx="26" fill="url(#panel)" stroke="#d9dce2"/>
  </g>
  <text x="1038" y="164" class="ui" font-size="21" font-weight="680">Home Wi-Fi</text>
  <text x="1038" y="190" class="ui muted small">Wi-Fi · en0</text>
  <circle cx="1362" cy="164" r="16" fill="#dff8ff"/>
  <text x="1362" y="171" text-anchor="middle" class="ui" font-size="18" fill="#12a9c9">⌁</text>
  <line x1="1038" y1="214" x2="1372" y2="214" stroke="#d9dde3"/>
  <text x="1038" y="252" class="ui" font-size="18">↓  12 KB/s</text>
  <text x="1372" y="252" text-anchor="end" class="ui" font-size="18">↑  3 KB/s</text>
  <line x1="1038" y1="276" x2="1372" y2="276" stroke="#d9dde3"/>

  <rect x="1038" y="298" width="334" height="178" rx="16" fill="#ffffff" opacity="0.72"/>
  <text x="1058" y="330" class="ui muted small">IP 地址</text><text x="1352" y="330" text-anchor="end" class="ui mono small" font-weight="600">192.168.5.188</text>
  <text x="1058" y="370" class="ui muted small">子网掩码</text><text x="1352" y="370" text-anchor="end" class="ui mono small" font-weight="600">255.255.255.0</text>
  <text x="1058" y="410" class="ui muted small">网关</text><text x="1352" y="410" text-anchor="end" class="ui mono small" font-weight="600">192.168.5.202</text>
  <text x="1058" y="450" class="ui muted small">DNS</text><text x="1352" y="450" text-anchor="end" class="ui mono small" font-weight="600">192.168.5.202</text>

  <text x="1038" y="514" class="ui muted" font-size="13">当前状态</text>
  <rect x="1038" y="528" width="108" height="38" rx="19" fill="#fff0e2"/>
  <text x="1092" y="552" text-anchor="middle" class="ui" font-size="15" font-weight="650" fill="#ff7a00">⌁ 旁路由</text>
  <rect x="1206" y="520" width="166" height="52" rx="13" fill="#0b84f3"/>
  <text x="1289" y="553" text-anchor="middle" font-family="-apple-system, PingFang SC" font-size="16" font-weight="650" fill="#fff">↻ 恢复 DHCP</text>

  <text x="1038" y="610" class="ui muted" font-size="14">✓ 已匹配旁路由配置 · 自动</text>
  <text x="1372" y="610" text-anchor="end" class="ui" font-size="14" fill="#0b84f3">编辑</text>
  <line x1="1038" y1="644" x2="1372" y2="644" stroke="#d9dde3"/>
  <rect x="1038" y="672" width="156" height="46" rx="12" fill="#e7e9ed"/>
  <text x="1116" y="701" text-anchor="middle" class="ui" font-size="15" font-weight="600">打开控制中心</text>
  <text x="1360" y="702" text-anchor="middle" class="ui" font-size="25">⏻</text>

  <text x="720" y="878" text-anchor="middle" class="ui muted" font-size="14">macOS 13+ · SwiftUI · 本地运行 · 无遥测</text>
</svg>
